<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Arch Remote Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #0f0f0f; color: #00ff41; padding: 50px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 500px; margin: 0 auto; }
        button { padding: 25px; font-size: 18px; cursor: pointer; border-radius: 12px; border: 2px solid #00ff41; background: transparent; color: #00ff41; transition: 0.3s; }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
        .status { margin-top: 30px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>🛰️ ARCH COMMAND CENTER</h1>
    <div class="btn-grid">
        <button onclick="location.href='/run/terminal'">📟 TERMINAL</button>
        <button onclick="location.href='/run/screenshot'">📸 SCREENSHOT</button>
        <button onclick="location.href='/run/type'">⌨️ TYPE TEXT</button>
        <button onclick="location.href='/run/alert'">⚠️ SYSTEM ALERT</button>
    </div>
    {% if status %}
        <div class="status">Остання дія: {{ status }}</div>
    {% endif %}
</body>
</html>
